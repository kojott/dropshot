name: Version Bump & Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-latest

    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      old_version: ${{ steps.bump.outputs.old_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: current
        run: |
          if [ -f version.txt ]; then
            VERSION=$(cat version.txt | tr -d '[:space:]')
          else
            VERSION="0.0.0"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Calculate new version
        id: bump
        env:
          CURRENT: ${{ steps.current.outputs.version }}
          BUMP_TYPE: ${{ inputs.bump }}
        run: |
          IFS='.' read -r major minor patch <<< "$CURRENT"
          major=${major:-0}
          minor=${minor:-0}
          patch=${patch:-0}

          case "$BUMP_TYPE" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          NEW_VERSION="${major}.${minor}.${patch}"
          echo "old_version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $BUMP_TYPE: $CURRENT → $NEW_VERSION"

      - name: Update version.txt
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: echo "$NEW_VERSION" > version.txt

      - name: Update Version.swift
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          cat > DropShot/App/Version.swift << SWIFT
          // Auto-generated by CI — do not edit manually.
          enum AppVersion {
              static let current = "$NEW_VERSION"
          }
          SWIFT

      - name: Update Info.plist versions
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          python3 - "$NEW_VERSION" << 'PYEOF'
          import sys, re
          version = sys.argv[1]
          with open("DropShot/App/Info.plist", "r") as f:
              content = f.read()
          content = re.sub(
              r'(<key>CFBundleVersion</key>\s*<string>)[^<]*(</string>)',
              rf'\g<1>{version}\g<2>', content)
          content = re.sub(
              r'(<key>CFBundleShortVersionString</key>\s*<string>)[^<]*(</string>)',
              rf'\g<1>{version}\g<2>', content)
          with open("DropShot/App/Info.plist", "w") as f:
              f.write(content)
          print(f"Updated Info.plist to {version}")
          PYEOF

      - name: Update CHANGELOG.md
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          OLD_VERSION: ${{ steps.bump.outputs.old_version }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          DATE=$(date +%Y-%m-%d)
          python3 - << 'PYEOF'
          import os
          version = os.environ["NEW_VERSION"]
          old = os.environ["OLD_VERSION"]
          repo = os.environ["REPO_URL"]
          date = os.environ.get("DATE", "")

          with open("CHANGELOG.md", "r") as f:
              content = f.read()

          old_header = "## [Unreleased]"
          new_section = f"## [Unreleased]\n\n## [{version}] - {date}"
          content = content.replace(old_header, new_section, 1)

          old_link_prefix = "[Unreleased]:"
          lines = content.split("\n")
          new_lines = []
          for line in lines:
              if line.startswith(old_link_prefix):
                  new_lines.append(f"[Unreleased]: {repo}/compare/v{version}...HEAD")
                  if old == "0.0.0":
                      new_lines.append(f"[{version}]: {repo}/releases/tag/v{version}")
                  else:
                      new_lines.append(f"[{version}]: {repo}/compare/v{old}...v{version}")
              else:
                  new_lines.append(line)
          content = "\n".join(new_lines)

          with open("CHANGELOG.md", "w") as f:
              f.write(content)
          print(f"Updated CHANGELOG.md for {version}")
          PYEOF

      - name: Update README badge
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          sed -i "s|version-[0-9]*\.[0-9]*\.[0-9]*-blue|version-${NEW_VERSION}-blue|g" README.md

      - name: Commit version bump
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt DropShot/App/Version.swift DropShot/App/Info.plist CHANGELOG.md README.md
          git commit -m "chore: bump version to ${NEW_VERSION}" || echo "No changes to commit"
          git push origin main

      - name: Create and push tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

  release:
    name: Build & Release
    needs: bump
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
