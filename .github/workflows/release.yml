name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_call: {}

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Determine version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # If triggered by tag push, extract from tag. Otherwise read version.txt.
          if [[ "$REF_NAME" == v* ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION=$(cat version.txt | tr -d '[:space:]')
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (tag: v$VERSION)"

      - name: Build release binary (arm64)
        run: swift build -c release --arch arm64

      - name: Build release binary (x86_64)
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        run: |
          mkdir -p .build/universal
          lipo -create \
            .build/arm64-apple-macosx/release/DropShot \
            .build/x86_64-apple-macosx/release/DropShot \
            -output .build/universal/DropShot
          file .build/universal/DropShot

      # TODO: Code signing placeholder.
      # To enable, set these repository secrets:
      #   DEVELOPER_ID_CERTIFICATE - base64-encoded .p12 certificate
      #   DEVELOPER_ID_PASSWORD    - certificate password
      #   SIGNING_IDENTITY         - signing identity string
      # Then change 'if: false' to 'if: true' below.
      - name: Code sign (placeholder)
        if: false
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          codesign --force --options runtime --sign "Developer ID" \
            .build/universal/DropShot

      # TODO: Notarization placeholder.
      # To enable, set these repository secrets:
      #   NOTARIZE_KEY_ID      - App Store Connect API key ID
      #   NOTARIZE_KEY_ISSUER  - API key issuer ID
      #   NOTARIZE_KEY_CONTENT - API key .p8 file contents
      # Then change 'if: false' to 'if: true' below.
      - name: Notarize (placeholder)
        if: false
        run: |
          mkdir -p notarize-payload
          cp .build/universal/DropShot notarize-payload/
          ditto -c -k notarize-payload notarize-payload.zip
          xcrun notarytool submit notarize-payload.zip --wait

      - name: Create app bundle
        run: |
          mkdir -p DropShot.app/Contents/MacOS
          mkdir -p DropShot.app/Contents/Resources
          cp .build/universal/DropShot DropShot.app/Contents/MacOS/
          cp DropShot/App/Info.plist DropShot.app/Contents/

          # Compile asset catalog (app icon) into the bundle
          xcrun actool DropShot/Resources/Assets.xcassets \
            --compile DropShot.app/Contents/Resources \
            --platform macosx \
            --minimum-deployment-target 13.0 \
            --app-icon AppIcon \
            --output-partial-info-plist /dev/null

      - name: Create DMG
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p dmg-staging
          cp -R DropShot.app dmg-staging/
          hdiutil create -volname "DropShot" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "DropShot-${RELEASE_VERSION}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: DropShot ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            DropShot-${{ steps.version.outputs.VERSION }}.dmg

      # TODO: Homebrew tap update placeholder.
      # To enable, set HOMEBREW_TAP_TOKEN secret with write access to the tap repository.
      # Then change 'if: false' to 'if: true' below.
      - name: Update Homebrew tap (placeholder)
        if: false
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          SHA256=$(shasum -a 256 "DropShot-${RELEASE_VERSION}.dmg" | awk '{print $1}')
          echo "DMG SHA256: ${SHA256}"
          echo "TODO: Update Homebrew tap formula with version ${RELEASE_VERSION} and sha256 ${SHA256}"
