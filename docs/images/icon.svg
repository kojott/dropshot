<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="arrow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
    <linearGradient id="tray" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d3561"/>
      <stop offset="100%" style="stop-color:#3a4a8a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle grid pattern for tech feel -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="96" y1="16" x2="96" y2="496"/>
    <line x1="176" y1="16" x2="176" y2="496"/>
    <line x1="256" y1="16" x2="256" y2="496"/>
    <line x1="336" y1="16" x2="336" y2="496"/>
    <line x1="416" y1="16" x2="416" y2="496"/>
    <line x1="16" y1="96" x2="496" y2="96"/>
    <line x1="16" y1="176" x2="496" y2="176"/>
    <line x1="16" y1="256" x2="496" y2="256"/>
    <line x1="16" y1="336" x2="496" y2="336"/>
    <line x1="16" y1="416" x2="496" y2="416"/>
  </g>

  <!-- Menu bar tray (bottom) -->
  <rect x="96" y="320" width="320" height="120" rx="16" ry="16" fill="url(#tray)" opacity="0.8"/>

  <!-- Tray opening / landing zone -->
  <rect x="136" y="330" width="240" height="8" rx="4" ry="4" fill="#00d4ff" opacity="0.4"/>

  <!-- File icon dropping in -->
  <g filter="url(#glow)" transform="translate(256,200)">
    <!-- File shape -->
    <path d="M-40,-80 L20,-80 L40,-60 L40,60 L-40,60 Z" fill="#e8e8f0" stroke="#aab" stroke-width="2"/>
    <!-- File fold -->
    <path d="M20,-80 L20,-60 L40,-60 Z" fill="#ccd" stroke="#aab" stroke-width="2"/>
    <!-- File lines -->
    <line x1="-24" y1="-44" x2="24" y2="-44" stroke="#667" stroke-width="4" stroke-linecap="round"/>
    <line x1="-24" y1="-24" x2="24" y2="-24" stroke="#889" stroke-width="4" stroke-linecap="round"/>
    <line x1="-24" y1="-4" x2="10" y2="-4" stroke="#889" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Download arrow (cyan, glowing) -->
  <g filter="url(#glow)">
    <path d="M256,270 L256,350" stroke="url(#arrow)" stroke-width="10" stroke-linecap="round"/>
    <path d="M230,330 L256,358 L282,330" stroke="url(#arrow)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Server path text hint -->
  <g transform="translate(256,410)">
    <rect x="-88" y="-16" width="176" height="32" rx="6" ry="6" fill="#0d1117" opacity="0.8"/>
    <text x="0" y="6" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#00d4ff" letter-spacing="0.5">/srv/uploads/</text>
  </g>

  <!-- Status dots (menu bar feel) -->
  <circle cx="380" cy="96" r="6" fill="#ff5f57"/>
  <circle cx="400" cy="96" r="6" fill="#febc2e"/>
  <circle cx="420" cy="96" r="6" fill="#28c840"/>
</svg>
