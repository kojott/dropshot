<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" width="960" height="400">
  <defs>
    <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
    <linearGradient id="menubar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3c"/>
      <stop offset="100%" style="stop-color:#2c2c2e"/>
    </linearGradient>
    <filter id="hshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="hglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="400" fill="url(#hbg)" rx="12"/>

  <!-- ===== STEP 1: Drop file ===== -->
  <g transform="translate(160,180)">
    <!-- Menu bar -->
    <rect x="-80" y="-20" width="160" height="28" rx="6" fill="url(#menubar)" filter="url(#hshadow)"/>
    <!-- Menu bar icon -->
    <g transform="translate(0,-6)">
      <rect x="-8" y="-6" width="16" height="12" rx="2" fill="#00d4ff" opacity="0.9"/>
      <path d="M-3,2 L0,-2 L3,2" stroke="#0d1117" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Other menu bar items -->
    <text x="-60" y="2" font-family="SF Pro,Helvetica,sans-serif" font-size="11" fill="#aaa">Wi-Fi</text>
    <text x="40" y="2" font-family="SF Pro,Helvetica,sans-serif" font-size="11" fill="#aaa">9:41</text>

    <!-- File being dragged -->
    <g transform="translate(-20,-70)" opacity="0.9">
      <rect x="-18" y="-24" width="36" height="44" rx="4" fill="#e8e8f0" stroke="#aab" stroke-width="1.5" filter="url(#hshadow)"/>
      <path d="M6,-24 L6,-14 L18,-14" fill="#ccd" stroke="#aab" stroke-width="1"/>
      <line x1="-8" y1="-8" x2="8" y2="-8" stroke="#889" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#aab" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-8" y1="8" x2="4" y2="8" stroke="#aab" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Drag arrow -->
    <path d="M-10,-45 C-5,-35 -2,-25 0,-12" stroke="#00d4ff" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.6"/>

    <!-- Highlight ring -->
    <rect x="-14" y="-14" width="28" height="20" rx="4" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Step 1 label -->
  <text x="160" y="280" text-anchor="middle" font-family="SF Pro,Helvetica,sans-serif" font-size="16" fill="#ffffff" font-weight="600">Drop</text>
  <text x="160" y="300" text-anchor="middle" font-family="SF Pro,Helvetica,sans-serif" font-size="12" fill="#8b949e">Drag any file onto</text>
  <text x="160" y="316" text-anchor="middle" font-family="SF Pro,Helvetica,sans-serif" font-size="12" fill="#8b949e">the menu bar icon</text>

  <!-- Step 1 number -->
  <circle cx="160" cy="100" r="16" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <text x="160" y="106" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#00d4ff" font-weight="700">1</text>

  <!-- ===== Arrow 1→2 ===== -->
  <g filter="url(#hglow)">
    <line x1="290" y1="180" x2="340" y2="180" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
    <path d="M335,175 L345,180 L335,185" fill="#00d4ff" opacity="0.4"/>
  </g>

  <!-- ===== STEP 2: SFTP Upload ===== -->
  <g transform="translate(480,155)">
    <!-- Upload animation -->
    <g opacity="0.15">
      <circle cx="0" cy="25" r="60" fill="#00d4ff"/>
    </g>

    <!-- Server rack -->
    <rect x="-30" y="-10" width="60" height="70" rx="6" fill="#21262d" stroke="#30363d" stroke-width="2" filter="url(#hshadow)"/>
    <!-- Server slots -->
    <rect x="-22" y="-2" width="44" height="10" rx="2" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="-22" y="14" width="44" height="10" rx="2" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <rect x="-22" y="30" width="44" height="10" rx="2" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <!-- LEDs -->
    <circle cx="16" cy="3" r="2.5" fill="#28c840"/>
    <circle cx="16" cy="19" r="2.5" fill="#28c840"/>
    <circle cx="16" cy="35" r="2.5" fill="#febc2e"/>
    <!-- Ventilation -->
    <line x1="-18" y1="48" x2="18" y2="48" stroke="#30363d" stroke-width="1"/>
    <line x1="-18" y1="52" x2="18" y2="52" stroke="#30363d" stroke-width="1"/>

    <!-- Upload arrow -->
    <g filter="url(#hglow)" transform="translate(0,-40)">
      <path d="M0,20 L0,-5" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
      <path d="M-8,2 L0,-8 L8,2" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- SFTP label -->
    <rect x="-24" y="66" width="48" height="18" rx="4" fill="#00d4ff" opacity="0.15"/>
    <text x="0" y="79" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#00d4ff" font-weight="600">SFTP</text>
  </g>

  <!-- Step 2 label -->
  <text x="480" y="280" text-anchor="middle" font-family="SF Pro,Helvetica,sans-serif" font-size="16" fill="#ffffff" font-weight="600">Upload</text>
  <text x="480" y="300" text-anchor="middle" font-family="SF Pro,Helvetica,sans-serif" font-size="12" fill="#8b949e">Secure transfer via</text>
  <text x="480" y="316" text-anchor="middle" font-family="SF Pro,Helvetica,sans-serif" font-size="12" fill="#8b949e">SSH/SFTP to your server</text>

  <!-- Step 2 number -->
  <circle cx="480" cy="100" r="16" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <text x="480" y="106" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#00d4ff" font-weight="700">2</text>

  <!-- ===== Arrow 2→3 ===== -->
  <g filter="url(#hglow)">
    <line x1="610" y1="180" x2="660" y2="180" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
    <path d="M655,175 L665,180 L655,185" fill="#00d4ff" opacity="0.4"/>
  </g>

  <!-- ===== STEP 3: Path in clipboard ===== -->
  <g transform="translate(800,150)">
    <!-- Terminal window -->
    <rect x="-90" y="-20" width="180" height="100" rx="8" fill="#1a1a2e" stroke="#30363d" stroke-width="2" filter="url(#hshadow)"/>
    <!-- Title bar -->
    <rect x="-90" y="-20" width="180" height="22" rx="8" fill="#2d2d3a"/>
    <rect x="-90" y="-6" width="180" height="8" fill="#2d2d3a"/>
    <!-- Traffic lights -->
    <circle cx="-74" cy="-9" r="4" fill="#ff5f57"/>
    <circle cx="-60" cy="-9" r="4" fill="#febc2e"/>
    <circle cx="-46" cy="-9" r="4" fill="#28c840"/>
    <!-- Title -->
    <text x="0" y="-5" text-anchor="middle" font-family="SF Pro,Helvetica,sans-serif" font-size="9" fill="#888">Terminal</text>

    <!-- Terminal content -->
    <text x="-78" y="16" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#8b949e">$</text>
    <text x="-66" y="16" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#c9d1d9">cat</text>

    <!-- The pasted path (highlighted) -->
    <rect x="-48" y="6" width="130" height="15" rx="2" fill="#00d4ff" opacity="0.12"/>
    <text x="-46" y="16" font-family="SF Mono,Menlo,monospace" font-size="10" fill="#00d4ff" font-weight="600">/srv/uploads/img.png</text>

    <!-- Cursor -->
    <rect x="-78" y="26" width="6" height="12" fill="#00d4ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Clipboard icon -->
    <g transform="translate(64,-44)" opacity="0.7">
      <rect x="-10" y="-4" width="20" height="24" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
      <rect x="-6" y="-8" width="12" height="6" rx="2" fill="#00d4ff" opacity="0.3" stroke="#00d4ff" stroke-width="1"/>
      <text x="0" y="11" text-anchor="middle" font-family="SF Pro,Helvetica,sans-serif" font-size="8" fill="#00d4ff">&#x2713;</text>
    </g>
  </g>

  <!-- Step 3 label -->
  <text x="800" y="280" text-anchor="middle" font-family="SF Pro,Helvetica,sans-serif" font-size="16" fill="#ffffff" font-weight="600">Paste</text>
  <text x="800" y="300" text-anchor="middle" font-family="SF Pro,Helvetica,sans-serif" font-size="12" fill="#8b949e">Server path copied</text>
  <text x="800" y="316" text-anchor="middle" font-family="SF Pro,Helvetica,sans-serif" font-size="12" fill="#8b949e">to your clipboard</text>

  <!-- Step 3 number -->
  <circle cx="800" cy="100" r="16" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <text x="800" y="106" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#00d4ff" font-weight="700">3</text>

  <!-- Bottom tagline -->
  <text x="480" y="370" text-anchor="middle" font-family="SF Pro,Helvetica,sans-serif" font-size="13" fill="#484f58">Your server. Your files. No cloud. No accounts.</text>
</svg>
